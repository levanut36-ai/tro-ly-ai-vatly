<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trợ lý AI Giáo viên Vật lí</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
height:100vh;
background:#f0f4f8;
}

.sidebar{
width:250px;
background:#1565c0;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.sidebar button:hover{
background:white;
color:#1565c0;
}

.content{
flex:1;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

h1{
margin-bottom:15px;
color:#1565c0;
}
</style>
</head>

<body>

<div class="sidebar">

<h2>🤖 AI Vật lí</h2>

<button onclick="showPage('home')">🏠 Trang chủ</button>

<button onclick="showPage('lesson')">📚 Soạn giáo án</button>

<button onclick="showPage('question')">❓ Sinh câu hỏi</button>

<button onclick="showPage('quiz')">📝 Trắc nghiệm</button>

<button onclick="showPage('bank')">📂 Ngân hàng câu hỏi</button>

</div>

<div class="content">

<div id="page">

<div class="card">
<h1>Trợ lý AI Giáo viên Vật lí</h1>

<p>
Hệ thống hỗ trợ giáo viên theo Chương trình GDPT 2018.
</p>

<br>

<ul>
<li>Soạn giáo án bằng AI</li>
<li>Sinh câu hỏi trắc nghiệm</li>
<li>Tạo đề kiểm tra</li>
<li>Ngân hàng câu hỏi</li>
<li>Xuất Word/PDF</li>
</ul>

</div>

</div>

</div>

<script>

function showPage(page){

let html='';

if(page==='home'){
html=`
<div class="card">
<h1>🏠 Trang chủ</h1>
<p>Chào mừng đến với Trợ lý AI Giáo viên Vật lí.</p>
</div>`;
}

if(page==='lesson'){
html=`
<div class="card">

<h1>📚 Soạn giáo án AI theo CV 5512</h1>

<p><b>Môn học</b></p>
<select style="width:100%;padding:10px;">
<option>Vật lí</option>
</select>

<br><br>

<p><b>Lớp</b></p>
<select style="width:100%;padding:10px;">
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<br><br>

<p><b>Tên bài học</b></p>
<input
id="tenBaiHoc"
type="text"
placeholder="Ví dụ: Chuyển động thẳng đều"
style="width:100%;padding:10px;">

<br><br>

<p><b>Số tiết</b></p>
<input
type="number"
value="1"
style="width:100%;padding:10px;">

<br><br>

<p><b>Yêu cầu cần đạt</b></p>
<textarea
rows="4"
style="width:100%;padding:10px;"
placeholder="Nhập yêu cầu cần đạt của bài học">
</textarea>

<br><br>

<p><b>Năng lực số tích hợp</b></p>

<select style="width:100%;padding:10px;">

<option>Không chọn</option>

<option>Sử dụng thiết bị số</option>

<option>Khai thác dữ liệu số</option>

<option>Giao tiếp và hợp tác số</option>

<option>Sáng tạo nội dung số</option>

<option>An toàn số</option>

<option>Giải quyết vấn đề bằng công nghệ số</option>

</select>

<br><br>

<p><b>Công cụ AI sử dụng</b></p>

<select style="width:100%;padding:10px;">

<option>ChatGPT</option>

<option>Gemini</option>

<option>Copilot</option>

<option>Canva AI</option>

</select>

<br><br>

<button
onclick="taoGiaoAn()"
style="
padding:12px 20px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;">
🚀 Tạo giáo án
</button>

<div id="ketQuaGiaoAn" style="margin-top:30px;"></div>

</div>`;
}

if(page==='question'){
html=`
<div class="card">
<h1>❓ Sinh câu hỏi AI</h1>
<p>Chức năng sẽ được phát triển ở giai đoạn tiếp theo.</p>
</div>`;
}

if(page==='quiz'){
html=`
<div class="card">
<h1>📝 Trắc nghiệm</h1>
<p>Tuần tới sẽ bổ sung làm bài và chấm điểm tự động.</p>
</div>`;
}

if(page==='bank'){
html=`
<div class="card">
<h1>📂 Ngân hàng câu hỏi</h1>
<p>Nơi lưu trữ câu hỏi Vật lí.</p>
</div>`;
}

document.getElementById('page').innerHTML=html;

}
function taoGiaoAn(){

document.getElementById("ketQuaGiaoAn").innerHTML = `

<div class="card">

<h1>GIÁO ÁN VẬT LÍ 10</h1>

<h2>Bài: Chuyển động thẳng đều</h2>

<hr>

<h3>I. MỤC TIÊU</h3>

<ul>
<li>Nêu được khái niệm chuyển động thẳng đều.</li>
<li>Vận dụng công thức tính quãng đường.</li>
<li>Phát triển năng lực giải quyết vấn đề.</li>
</ul>

<h3>II. THIẾT BỊ DẠY HỌC</h3>

<ul>
<li>Máy chiếu.</li>
<li>Máy tính.</li>
<li>Video mô phỏng chuyển động.</li>
</ul>

<h3>III. TIẾN TRÌNH DẠY HỌC</h3>

<p><b>Hoạt động 1: Khởi động</b></p>

<p>
Quan sát video chuyển động của xe đạp và trả lời câu hỏi.
</p>

<p><b>Hoạt động 2: Hình thành kiến thức</b></p>

<p>
Tìm hiểu khái niệm chuyển động thẳng đều.
</p>

<p><b>Hoạt động 3: Luyện tập</b></p>

<p>
Giải bài tập vận dụng.
</p>

<p><b>Hoạt động 4: Vận dụng</b></p>

<p>
Liên hệ thực tế giao thông địa phương.
</p>

<h3>IV. ĐÁNH GIÁ</h3>

<ul>
<li>Câu hỏi trắc nghiệm.</li>
<li>Phiếu học tập.</li>
<li>Đánh giá sản phẩm nhóm.</li>
</ul>

</div>

`;

}
</script>

</body>
</html>
