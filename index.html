<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trợ lý AI Giáo viên Vật lí</title>

<style>
*{
margin:0;
padding:0;

}

body{

.content{

<body>

}

if(tenBaiHoc.toLowerCase().includes("rơi tự do")){

<li>Máy chiếu.</li>

<p><b>Hoạt động 4: Vận dụng</b></p>

</p>

<p><b>Hoạt động 2: Hình thành kiến thức</b></p>

<p>
Tìm hiểu khái niệm chuyển động thẳng đều.
</p>

<p><b>Hoạt động 3: Luyện tập</b></p>

<p>
Giải bài tập vận dụng.
</p>

<p><b>Hoạt động 4: Vận dụng</b></p>

<h3>IV. CÔNG CỤ AI SỬ DỤNG</h3>

<h3>V. TIẾN TRÌNH DẠY HỌC</h3>

}
</script>
